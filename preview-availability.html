<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reservation</title>
        <link rel="stylesheet" href="styles/preview-availability.css">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
        <script src="scripts/preview-availability.js" defer></script>
    </head>

    <body>
        <div class="container">
            <div class="banner">
                <header>
                    <nav class="home-nav">
                        <ul>
                            <li class="logo"><a href="index.html">Labynx</a></li>
                            <li><a href="index.html">Home</a></li>
                            <li><a href="preview-availability.html">View Labs</a></li>
                            <li><a href="index.html#contact">Contact</a></li>
                        </ul>
                        <div class="dropdown">
                            <a href="#">Sign in ▾</a>
                            <div class="dropdown-content">
                                <a id="sign-in">Log In</a>
                                <a id="register">Register</a>
                            </div>
                        </div>
                    </nav>
                </header>
            </div>
            <main>
                <div class="info-container">
                    <div>
                        <svg class="info-container-logo" viewBox="0 25 100 85">       
                            <image xlink:href="images/reservation-smartphone-svgrepo-com.svg"/>    
                        </svg>
                    </div>
                    <div class="vertical-divider"></div>
                    <div>
                        <h1> Preview Tab</h1>
                        <p> Preview a Laboratory by filling out the information below and selecting which rooms are availabln</p>
                    </div>
                </div>
                <div class="form-container">
                    <div class="form-information-container">
                        <form action="./view-slot-availability.html" method="POST" id="reservation_form">
                            <p>
                                <label for="buildings"> Building: </label>
                                <select id="buildings" onchange="handleBuildingChange(this)">
                                    <option value="GH" selected> Gokongwei Hall </option>
                                    <option value="STRC"> Science and Technology Research Center </option>
                                    <option value="SJ"> St. Joseph Hall </option>
                                    <option value="LS"> St. La Salle Hall </option>
                                    <option value="MH"> St. Miguel Hall </option>
                                    <option value="VH"> Velasco Hall </option>
                                </select>
                            </p>
                            <hr>
                            <p>
                                <label for="floor"> Floor: </label>
                                <select id="floors">
                                    <!--- Since Goks is the default, ill just put this here -->
                                    <option value="3rd Floor" selected> 3rd Floor </option>
                                    <option value="4th Floor"> 4th Floor </option>
                                </select>
                            </p>
                            <hr>
                            <p>
                                <label for="capacity"> Capacity: </label>
                                <select id="capacities">
                                    <option value="1-4 people" selected> 1-4 people </option>
                                    <option value="4-8 people"> 4-8 people </option>
                                </select>
                            </p>
                            <hr>
                            <p>
                                <label> View Reservation Ability: </label>
                                <input type="submit" value="Show availability">
                            </p>
                        </form>
                    </div>
                    <div class="form-image-container">
                        <div class="slider"> 
                            <img src="images/GH.jpg" alt="Picture of Gokongwei Hall" id="slide-1"></img>
                            <img src="images/STRC.jpg" alt="Picture of Science and Technology Research Center" id="slide-2"></img>
                            <img src="images/SJ.jpg" alt="Picture of St. Joseph Hall" id="slide-3"></img>
                            <img src="images/LS.jpg" alt="Picture of St. La Salle Hall" id="slide-4"></img>
                            <img src="images/MH.jpg" alt="Picture of St. Miguel Hall" id="slide-5"></img>
                            <img src="images/VELASCO.jpg" alt="Picture of Velasco Hall" id="slide-6"></img>
                        </div>
                        <div class="slider-nav">
                            <a href="#slide-1"></a>
                            <a href="#slide-2"></a>
                            <a href="#slide-3"></a>
                            <a href="#slide-4"></a>
                            <a href="#slide-5"></a>
                            <a href="#slide-6"></a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
